<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Greenish - Waste Management Session</title>
    <link rel="stylesheet" href="/static/css/session.css?v=9">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="home-page">
    <div class="home-particles" id="particles"></div>

    <nav class="home-nav">
        <a href="/session/cms/" class="nav-btn">🔑 Facilitator</a>
    </nav>

    <div class="home-container">
        <div class="home-logo">
            <img src="/static/img/logo.svg?v=6" alt="Greenish" class="logo-img">
        </div>
        <h1 class="home-title">Greenish Club MUST</h1>
        <p class="home-subtitle">Waste Management Awareness Session</p>

        <div class="home-actions">
            <form id="join-form" action="" method="get" class="join-form-home">
                <input type="text" id="join-code" name="code" placeholder="Enter Session Code" class="input-code" maxlength="6" autocomplete="off" autofocus>
                <button type="submit" class="btn btn-primary btn-large">Join →</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('join-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            if (code) {
                window.location.href = '/session/' + code + '/join/';
            }
        });

        const container = document.getElementById('particles');
        if (container) {
            const emojis = ['🌿', '🍃', '🌱', '💚', '♻️', '🌍'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = (Math.random() * 6) + 's';
                p.style.animationDuration = (4 + Math.random() * 4) + 's';
                container.appendChild(p);
            }
        }
    </script>
</body>
</html>
