<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Facilitator Login - Greenish</title>
    <link rel="stylesheet" href="{% static 'css/session.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; }
        .login-form-container {
            max-width: 400px;
            width: 100%;
        }
        .form-error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body class="join-page">
    <div class="form-container login-form-container">
        <div class="form-logo">
            <img src="{% static 'img/logo.svg' %}" alt="Greenish" class="logo-img-small">
        </div>
        <h1>Facilitator Login</h1>
        <p class="form-subtitle">Access your session management dashboard</p>

        {% if error %}
        <div class="form-error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" class="form-input" required>
            </div>
            <button type="submit" class="btn btn-primary btn-large btn-full">
                🔑 Sign In
            </button>
        </form>

        <a href="/session/" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
