<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Session - Greenish</title>
    <link rel="stylesheet" href="/static/css/session.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="create-page">
    <div class="form-container">
        <div class="form-logo">
            <img src="/static/img/logo.svg?v=4" alt="Greenish" class="logo-img-small">
        </div>
        <h1>Create a Session</h1>
        <p class="form-subtitle">Set up your waste management awareness session</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Session Title</label>
                <input type="text" id="title" name="title" placeholder="e.g., Greenish Club - Dahshur" class="form-input" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-large btn-full">
                🌿 Create Session
            </button>
        </form>

        <a href="/session/cms/" class="back-link">← Back to CMS</a>
    </div>
</body>
</html>
